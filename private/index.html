<!doctype html><html lang="en"><head>  <meta charset="UTF-8">  <title>CHCCA Documents</title>  <style>    body {      background-image: url('../images/nadkbl.gif');      color: #FFF0CC;      font-family: "Footlight MT Light", Georgia, serif;      text-align: center;      margin: 0;      padding: 0;    }    .container {      max-width: 600px;      margin: 120px auto;      padding: 20px;    }    h1 {      font-size: 28px;      margin-bottom: 20px;    }    input {      padding: 8px;      font-size: 16px;      border: none;      margin-right: 10px;    }    button {      padding: 8px 16px;      font-size: 16px;      background-color: #FFF0CC;      color: #000;      border: none;      cursor: pointer;    }    button:hover {      background-color: #e6d8b0;    }    .error {      color: #ff9999;      margin-top: 15px;    }    .footer {      margin-top: 60px;    }    .footer img {      margin: 5px;    }  </style></head><body><div class="container">  <h1>Corn Hill Owners' Documents</h1>  <p>Please enter password to continue</p>  <input type="password" id="password" placeholder="Password"         onkeypress="if(event.key==='Enter') checkPassword()">  <button onclick="checkPassword()">Enter</button>  <p id="error" class="error"></p></div><div class="footer">  <img src="../images/crab.gif" height="35">  <img src="../images/compass.gif" height="35">  <img src="../images/lighthouse.gif" height="35">  <img src="../images/conchshell.gif" height="35">  <img src="../images/sailboat.gif" height="35">  <img src="../images/scallop.gif" height="35">  <img src="../images/fish.gif" height="35"></div><script>function checkPassword() {  var input = document.getElementById("password").value;  var correct = "cornhill02666";  // ← change this  if (input === correct) {    window.location.href = "./docs.html";  } else {    document.getElementById("error").innerText = "Incorrect password";  }}</script></body></html>
